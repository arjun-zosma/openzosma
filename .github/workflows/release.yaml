name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION"
          npm --prefix packages/create-openzosma version "$VERSION" --no-git-tag-version --allow-same-version
          npm --prefix packages/pi-harness version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Type check
        run: pnpm run check

      - name: Publish create-openzosma
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/create-openzosma
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish pi-harness
        run: pnpm publish --access public --no-git-checks
        working-directory: packages/pi-harness
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: "v${{ env.VERSION }}"
          token: ${{ secrets.GITHUB_TOKEN }}
