apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzosma.secretName" . }}
  labels:
    {{- include "openzosma.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.postgresql.password (not .Values.postgresql.existingSecret) }}
  DB_PASS: {{ .Values.postgresql.password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgresql.username .Values.postgresql.password .Values.postgresql.host (.Values.postgresql.port | int) .Values.postgresql.database | quote }}
  {{- end }}

  {{- if .Values.auth.secret }}
  AUTH_SECRET: {{ .Values.auth.secret | quote }}
  {{- end }}

  {{- if .Values.auth.encryptionKey }}
  ENCRYPTION_KEY: {{ .Values.auth.encryptionKey | quote }}
  {{- end }}

  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}

  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}

  {{- if .Values.llm.localModelUrl }}
  OPENZOSMA_LOCAL_MODEL_URL: {{ .Values.llm.localModelUrl | quote }}
  {{- end }}

  {{- if .Values.llm.localModelId }}
  OPENZOSMA_LOCAL_MODEL_ID: {{ .Values.llm.localModelId | quote }}
  {{- end }}

  {{- if .Values.llm.localModelApiKey }}
  OPENZOSMA_LOCAL_MODEL_API_KEY: {{ .Values.llm.localModelApiKey | quote }}
  {{- end }}

  {{- if .Values.auth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  {{- end }}

  {{- if .Values.auth.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}

  {{- if .Values.auth.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  {{- end }}

  {{- if .Values.auth.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | quote }}
  {{- end }}
