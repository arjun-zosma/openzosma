# =============================================================================
# Default sandbox policy for OpenZosma pi-agent sandboxes.
#
# Adapted from NemoClaw's openclaw-sandbox.yaml for the pi-coding-agent
# runtime. Deny-by-default filesystem with explicit allowlists.
# Network uses a catch-all HTTPS rule so the agent can reach any API.
#
# Filesystem and process policies are locked at sandbox creation.
# Network policies are hot-reloadable via OpenShell.
# =============================================================================

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - "/usr"
    - "/lib"
    - "/proc"
    - "/dev/urandom"
    - "/app"
    - "/etc"
    - "/var/log"
  read_write:
    - "/sandbox"
    - "/workspace"
    - "/tmp"
    - "/dev/null"
    - "/home/sandbox"

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

# ---------------------------------------------------------------------------
# Network policy: allowlist HTTPS
#
# OpenShell's L7 validator requires specific host patterns (bare "*" is
# rejected). Rules are grouped by function so they can be extended or
# removed independently.
# ---------------------------------------------------------------------------
network_policies:
  llm_providers:
    name: llm_providers
    endpoints:
      # Anthropic
      - host: "api.anthropic.com"
        port: 443
        enforcement: enforce
      # OpenAI
      - host: "api.openai.com"
        port: 443
        enforcement: enforce
      - host: "*.openai.com"
        port: 443
        enforcement: enforce
      # Google Gemini
      - host: "generativelanguage.googleapis.com"
        port: 443
        enforcement: enforce
      # OpenRouter / local model proxies
      - host: "openrouter.ai"
        port: 443
        enforcement: enforce
    binaries:
      - path: "/usr/local/bin/node"

  package_registries:
    name: package_registries
    endpoints:
      - host: "registry.npmjs.org"
        port: 443
        enforcement: enforce
      - host: "*.npmjs.org"
        port: 443
        enforcement: enforce
      - host: "pypi.org"
        port: 443
        enforcement: enforce
      - host: "files.pythonhosted.org"
        port: 443
        enforcement: enforce
    binaries:
      - path: "/usr/local/bin/node"
      - path: "/usr/local/bin/npm"
      - path: "/usr/local/bin/npx"
      - path: "/usr/bin/python3"
      - path: "/usr/bin/pip3"

  github:
    name: github
    endpoints:
      - host: "github.com"
        port: 443
        enforcement: enforce
      - host: "*.github.com"
        port: 443
        enforcement: enforce
      - host: "raw.githubusercontent.com"
        port: 443
        enforcement: enforce
      - host: "objects.githubusercontent.com"
        port: 443
        enforcement: enforce
      - host: "api.github.com"
        port: 443
        enforcement: enforce
    binaries:
      - path: "/usr/bin/git"
      - path: "/usr/local/bin/node"
      - path: "/usr/bin/curl"
