# HuggingFace access preset
huggingface:
  name: huggingface
  endpoints:
    - host: "huggingface.co"
      port: 443
      tls: passthrough
      enforcement: enforce
    - host: "cdn-lfs.huggingface.co"
      port: 443
      tls: passthrough
      enforcement: enforce
    - host: "api-inference.huggingface.co"
      port: 443
      tls: passthrough
      enforcement: enforce
  binaries:
    - path: "/usr/local/bin/node"
    - path: "/usr/bin/python3"
